server:
  port: 8888

spring:
  application:
    name: configserver
  cloud:
    config:
      server:
        git:
          uri: https://github.com/Mohamad-Daif/Product_and_Coupon_Remote_Configuration.git
          default-label: main
          clone-on-start: true
          force-pull: true
          timeout: 15
        bootstrap: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/